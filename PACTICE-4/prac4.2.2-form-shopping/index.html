<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Đặt Hàng</title>
    <link rel="stylesheet" href="s2.css">
</head>
<body>
    <div class="form-card">
        <h1>🛒 ĐƠN ĐẶT HÀNG</h1>
        
        <form id="orderForm">
            <div class="form-group">
                <label>Sản phẩm</label>
                <select id="product">
                    <option value="">-- Chọn sản phẩm --</option>
                    <option value="Laptop">Macbook Pro M5 Max (200.000.000đ)</option>
                    <option value="Phone">iPhone 17 Pro Max 1TB (70.000.000đ)</option>
                    <option value="Tablet">iPad Pro 12.9 inch (35.000.000đ)</option>
                </select>
                <small class="error-msg" id="err-product"></small>
            </div>

            <div class="form-group">
                <label>Số lượng</label>
                <input type="number" id="quantity" value="1" min="1" max="99">
                <small class="error-msg" id="err-quantity"></small>
            </div>

            <div class="form-group">
                <label>Tổng thanh toán: <span id="totalDisplay">0đ</span></label>
            </div>

            <div class="form-group">
                <label>Ngày giao hàng</label>
                <input type="date" id="deliveryDate">
                <small class="error-msg" id="err-date"></small>
            </div>

            <div class="form-group">
                <label>Địa chỉ nhận hàng</label>
                <input type="text" id="address">
                <small class="error-msg" id="err-address"></small>
            </div>

            <div class="form-group">
                <label>Ghi chú </label>
                <textarea id="note" rows="3"></textarea>
                <small class="error-msg" id="err-note"></small>
            </div>

            <div class="form-group">
                <label>Thanh toán</label>
                <div class="payment-methods">
                    <label><input type="radio" name="payment" value="COD"> COD</label>
                    <label><input type="radio" name="payment" value="Bank"> Bank</label>
                </div>
                <small class="error-msg" id="err-payment"></small>
            </div>

            <button type="submit">TIẾN HÀNH ĐẶT HÀNG</button>
        </form>
    </div>

    <div id="confirmBox">
        <div class="confirm-content">
            <h3>📋 XÁC NHẬN ĐƠN HÀNG</h3>
            <div id="summaryContent"></div>
            <div class="confirm-buttons">
                <button id="btnFinalConfirm" class="btn-green">Xác nhận</button>
                <button id="btnCancel" class="btn-red">Hủy</button>
            </div>
        </div>
    </div>

    <script src="scr.js"></script>
</body>
</html>
