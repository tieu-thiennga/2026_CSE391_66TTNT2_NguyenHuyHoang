<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form basic infor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <form action="">

            <fieldset>
                <legend>Basic Info</legend>
                <hr>

                <div>
                    <label>Employee ID:</label>
                    <span>9</span>
                </div>

                <div>
                    <label>Last Name:</label>
                    <span>Dodsworth</span>
                </div>

                <div>
                    <label for="fname">First Name:</label>
                    <input type="text" id="fname" value="Anne">
                </div>

                <div class="gender">
                    <label class="gender-label">Gender</label>

                    <div class="gender-options">
                        <label><input type="radio" name="gender"> Male</label>
                        <label><input type="radio" name="gender"> Female</label>
                        <label><input type="radio" name="gender"> XXX</label>
                        <label><input type="radio" name="gender" checked> ZZZ</label>
                    </div>
                </div>


                <div>
                    <label for="title">Title:</label>
                    <input type="text" id="title" value="Sales Representative">
                </div>

                <div>
                    <label for="suffix">Suffix:</label>
                    <input type="text" id="suffix" value="Ms.">
                </div>

                <div>
                    <label for="birth">Birth Date:</label>
                    <input type="text" id="birth" value="1969-07-02 00:00:00">
                </div>

                <div>
                    <label for="hire">Hire Date:</label>
                    <input type="text" id="hire" value="1994-11-15 00:00:00">
                </div>

                <div>
                    <label for="ssn">SSN # (if applicable):</label>
                    <input type="text" id="ssn">
                </div>

                <div>
                    <label for="report">Reports To:</label>
                    <select id="report">
                        <option>Buchanan</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Contact Info</legend>
                <hr>

                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="name.example@gmail.com">
                </div>

                <div>
                    <label for="address">Address:</label>
                    <input type="text" id="address" value="7 Houndstooth Rd.">
                </div>

                <div>
                    <label for="city">City:</label>
                    <input type="text" id="city" value="London">
                </div>

                <div>
                    <label for="region">Region:</label>
                    <input type="text" id="region">
                </div>

                <div>
                    <label for="postal">Postal Code:</label>
                    <input type="text" id="postal" value="WG2 7LT">
                </div>

                <div>
                    <label for="country">Country:</label>
                    <select id="country">
                        <option>Russian Federation</option>
                    </select>
                </div>

                <div>
                    <label for="phone">US Home Phone:</label>
                    <input type="text" id="phone" value="(234)234-2342">
                </div>

                <div>
                    <label for="photo">Photo:</label>
                    <input type="text" id="photo" value="EmpID9.bmp">
                </div>
            </fieldset>

            <fieldset>
                <legend>Optional Info</legend>
                <hr>

                <div>
                    <label for="notes">Notes:</label>
                    <textarea id="notes" rows="10" cols="130">
Anne has a BA degree in English from St. Lawrence College.
She is fluent in French and German.ZZZ
                    </textarea>
                </div>

                <div>
                    <label>Preferred Shift:</label>
                    <input type="checkbox" id="regular">
                    <label for="regular">Regular</label>

                    <input type="checkbox" id="grave" checked>
                    <label for="grave">Gravy Yard</label>
                </div>

                <div>
                    <label for="active">Active?</label>
                    <input type="checkbox" id="active" checked>
                </div>

                <div>
                    <label>Are you human?</label>
                    <div>T I D A W O</div>
                    <input type="text">
                </div>
            </fieldset>

            <div>
                <input type="submit" value="Submit">
                <input type="reset" value="Cancel">
            </div>

        </form>
    </div>
</body>

</html>
