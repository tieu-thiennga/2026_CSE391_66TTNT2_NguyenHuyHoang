<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Get in touch with us by filling contact form bellow</h2>
        <form action="main" class="">
            <div class="f-t">
                <input type="text" placeholder="*Enter your full name" required>
                <input type="text" placeholder="*Enter your email address" required>
            </div>
           
            <div class="f-t">
                <input type="text" placeholder="Enter your subject">
            </div>
            <div class="f-t">
                <textarea name="text" placeholder="*Your message here...." required></textarea>
            </div>
            <div class="f-t footer">
                <button type="submit" class= "button-submit"> Send message</button>
                <span class="note-text">* please fill all required form field, thanks!</span>
            </div>
        </form>
    </div>

</body>
</html>
